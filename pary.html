<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sesje par</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">

<style>

/* identyczny styl jak plener */

body {
margin:0;
font-family:'Montserrat',sans-serif;
background:white;
}

nav {
position:fixed;
top:0;
width:100%;
background:white;
border-bottom:1px solid #eee;
padding:18px 0;
z-index:999;
}

.nav-container {
max-width:1150px;
margin:auto;
display:flex;
justify-content:space-between;
padding:0 25px;
}

.logo {
font-family:'Playfair Display',serif;
font-size:22px;
letter-spacing:3px;
}

.menu a {
text-decoration:none;
color:#111;
margin-left:14px;
font-size:13px;
letter-spacing:2px;
border:1px solid transparent;
padding:10px 18px;
transition:0.3s;
}

.menu a:hover {
border:1px solid #111;
}

.album-title {
padding-top:160px;
text-align:center;
font-family:'Playfair Display',serif;
font-size:38px;
letter-spacing:4px;
margin-bottom:60px;
}

.gallery {
display:grid;
grid-template-columns: repeat(3, 320px);
justify-content:center;
gap:35px;
}

.gallery img {
width:320px;
aspect-ratio:4/5;
object-fit:cover;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover {
transform:scale(1.03);
opacity:0.9;
}

.lightbox {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
}

.lightbox img {
max-width:90%;
max-height:90%;
}

.arrow {
position:absolute;
top:50%;
font-size:40px;
color:white;
cursor:pointer;
padding:20px;
}

.arrow-left { left:20px; }
.arrow-right { right:20px; }

</style>

</head>

<body>

<nav>

<div class="nav-container">

<div class="logo">
LUUILYY PHOTO
</div>

<div class="menu">

<a href="index.html">Strona główna</a>
<a href="index.html#portfolio">Portfolio</a>
<a href="index.html#about">O mnie</a>
<a href="index.html#contact">Kontakt</a>
<a href="rezerwacja.html">Rezerwacja</a>

</div>

</div>

</nav>

<h2 class="album-title">
SESJE PAR
</h2>

<div class="gallery">

<img src="6.jpg">
<img src="Bez nazwy-51.jpg">
<img src="IMG_1010.JPG">

</div>

<div class="lightbox" id="lightbox">

<span class="arrow arrow-left" id="prev">&#10094;</span>

<img id="lightbox-img">

<span class="arrow arrow-right" id="next">&#10095;</span>

</div>

<script>

/* ten sam skrypt co wyżej */

const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const next = document.getElementById("next");
const prev = document.getElementById("prev");

let currentIndex = 0;

images.forEach((img, index) => {

img.addEventListener("click", () => {

currentIndex = index;
showImage();
lightbox.style.display = "flex";

});

});

function showImage() {

lightboxImg.src = images[currentIndex].src;

}

next.addEventListener("click", (e) => {

e.stopPropagation();

currentIndex++;
if (currentIndex >= images.length) currentIndex = 0;

showImage();

});

prev.addEventListener("click", (e) => {

e.stopPropagation();

currentIndex--;
if (currentIndex < 0) currentIndex = images.length - 1;

showImage();

});

lightbox.addEventListener("click", () => {

lightbox.style.display = "none";

});

document.addEventListener("keydown", (e) => {

if (e.key === "Escape") lightbox.style.display = "none";

if (e.key === "ArrowRight") next.click();

if (e.key === "ArrowLeft") prev.click();

});

</script>

</body>

</html>
