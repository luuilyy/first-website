<head>
    <meta charset="UTF-8">

<header class="header">

<section class="booking-section">

    <h2>Zarezerwuj sesję</h2>

    <!-- SimplyBook Widget -->
    <script src="//widget.simplybook.it/v2/widget/widget.js"></script>

    <script>
        var widget = new SimplybookWidget({
            "widget_type": "iframe",
            "url": "https://luuilyyphoto.simplybook.it",
            "theme": "space",

            "theme_settings": {

                "timeline_hide_unavailable": "1",

                "sb_base_color": "#000000",

                "body_bg_color": "#ffffff",

                "dark_font_color": "#222222",

                "light_font_color": "#ffffff",

                "btn_color_1": "#000000",

                "sb_busy": "#e5e5e5",

                "sb_available": "#f7f7f7"

            },

            "timeline": "modern",

            "datepicker": "top_calendar"

        });
    </script>

</section>

<footer class="footer">

    <p>© 2026 Luuilyy.photo</p>

</footer>
