<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rezerwacja | Luuilyy Photo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */

body {
margin:0;
font-family:'Montserrat',sans-serif;
background:white;
color:#111;
}

/* ===== NAV ===== */

nav {

position:fixed;
top:0;
width:100%;

background:white;
border-bottom:1px solid #eee;

padding:18px 0;

z-index:999;

}

.nav-container {

max-width:1150px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 25px;

}

.logo {

font-family:'Playfair Display',serif;
font-size:22px;
letter-spacing:3px;

}

/* ===== HAMBURGER ===== */

.hamburger {

font-size:28px;
cursor:pointer;

}

/* ===== MENU PANEL ===== */

.menu {

position:fixed;

top:0;
right:0;

width:280px;
height:100vh;

background:white;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transform:translateX(100%);
transition:0.3s;

box-shadow:-5px 0 15px rgba(0,0,0,0.1);

z-index:1000;

}

.menu.active {

transform:translateX(0);

}

.menu a {

text-decoration:none;
color:#111;

padding:18px;

font-size:14px;
letter-spacing:2px;

transition:0.3s;

}

.menu a:hover {

color:#888;

}

/* ===== OVERLAY ===== */

.overlay {

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.3);

opacity:0;
pointer-events:none;

transition:0.3s;

z-index:900;

}

.overlay.active {

opacity:1;
pointer-events:auto;

}

/* ===== TYTUŁ ===== */

.page-title {

padding-top:150px;

text-align:center;

font-family:'Playfair Display',serif;

font-size:40px;
letter-spacing:4px;

margin-bottom:50px;

}

/* ===== BOOKING ===== */

.booking-container {

max-width:1100px;

margin:auto;

padding:20px;

}

/* ===== MOBILE ===== */

@media (max-width:768px){

.page-title {

font-size:28px;
padding-top:140px;

}

.menu {

width:260px;

}

}

</style>

</head>

<body>

<!-- ===== NAV ===== -->

<nav>

<div class="nav-container">

<div class="logo">
LUUILYY PHOTO
</div>

<div class="hamburger" onclick="toggleMenu()">
☰
</div>

</div>

</nav>

<!-- ===== MENU ===== -->

<div class="menu" id="menu">

<a href="index.html">Strona główna</a>

<a href="index.html#portfolio">Portfolio</a>

<a href="faq.html">FAQ</a>

<a href="index.html#about">O mnie</a>

<a href="index.html#contact">Kontakt</a>

<a href="rezerwacja.html">Rezerwacja</a>

</div>

<div class="overlay" id="overlay"></div>

<!-- ===== TYTUŁ ===== -->

<h2 class="page-title">

ZAREZERWUJ SESJĘ

</h2>

<!-- ===== BOOKING ===== -->

<div class="booking-container">

<script src="//widget.simplybook.it/v2/widget/widget.js"></script>

<script>

var widget = new SimplybookWidget({

"widget_type": "iframe",

"url": "https://luuilyyphoto.simplybook.it",

"theme": "space",

"theme_settings": {

"timeline_hide_unavailable": "1",

"sb_base_color": "#000000",

"body_bg_color": "#ffffff",

"dark_font_color": "#222222",

"light_font_color": "#ffffff",

"btn_color_1": "#000000",

"sb_busy": "#e5e5e5",

"sb_available": "#f7f7f7"

},

"timeline": "modern",

"datepicker": "top_calendar"

});

</script>

</div>

<script>

/* ===== MENU ===== */

function toggleMenu() {

document.getElementById("menu").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");

}

document.getElementById("overlay").addEventListener("click", function(){

document.getElementById("menu").classList.remove("active");
document.getElementById("overlay").classList.remove("active");

});

const menuLinks = document.querySelectorAll(".menu a");

menuLinks.forEach(link => {

link.addEventListener("click", () => {

document.getElementById("menu").classList.remove("active");
document.getElementById("overlay").classList.remove("active");

});

});

</script>

</body>

</html>
