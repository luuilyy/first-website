<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Luuilyy Photo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BODY */

body {
    margin: 0;
    background-color: black;
    color: white;
    font-family: 'Montserrat', sans-serif;
}

/* HEADER — fashion style */

header {
    text-align: center;
    padding-top: 160px;
    padding-bottom: 80px;
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 300;
    letter-spacing: 3px;
    margin: 0;
}

.subtitle {
    margin-top: 15px;
    font-size: 13px;
    letter-spacing: 4px;
    color: #999;
}

/* HERO — duże zdjęcie */

.hero {
    display: flex;
    justify-content: center;
}

.hero img {
    width: 500px;
    height: auto;
}

/* SECTION */

.section {
    padding: 120px 20px;
    text-align: center;
}

/* MY WORK TITLE */

.section h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 60px;
}

/* GALLERY */

.gallery {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

/* zdjęcia 4:5 */

.gallery img {
    width: 280px;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    transition: transform 0.4s ease;
}

/* hover efekt — fashion vibe */

.gallery img:hover {
    transform: scale(1.05);
}

</style>

</head>

<body>

<header>

<h1>Luuilyy Photo</h1>

<p class="subtitle">
FASHION • FAIRYCORE • PORTRAITS
</p>

</header>

<div class="hero">

<img src="505947252_9991842110891643_2799595505019481989_n.jpg">

</div>

<div class="section">

<h2>My Work</h2>

<div class="gallery">

<img src="505947252_9991842110891643_2799595505019481989_n.jpg">

<img src="7549f87c-7076-4012-ac51-eb9521bd15bb.jpg">

<img src="julka.jpg">

</div>

</div>

</body>

</html>
