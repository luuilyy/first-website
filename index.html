<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luuilyy Photo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */

body {
margin:0;
font-family:'Montserrat',sans-serif;
background:white;
}

/* ===== NAVBAR ===== */

nav {

position:fixed;
top:0;
width:100%;

background:white;
border-bottom:1px solid #eee;

padding:18px 0;
z-index:999;

}

.nav-container {

max-width:1150px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 25px;

}

.logo {

font-family:'Playfair Display',serif;
font-size:22px;
letter-spacing:3px;

}

/* ===== HAMBURGER ===== */

.hamburger {

font-size:28px;
cursor:pointer;
z-index:1001;

}

/* ===== MENU PANEL (PRAWA STRONA) ===== */

.menu {

position:fixed;

top:0;
right:0;

width:280px;
height:100vh;

background:white;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transform:translateX(100%);
transition:0.3s;

box-shadow:-5px 0 15px rgba(0,0,0,0.1);

z-index:1000;

}

.menu.active {

transform:translateX(0);

}

/* ===== MENU LINKI ===== */

.menu a {

text-decoration:none;
color:#111;

padding:18px;

font-size:13px;
letter-spacing:2px;

text-align:center;

transition:0.3s;

}

.menu a:hover {

color:#888;

}

/* ===== OVERLAY ===== */

.overlay {

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.3);

opacity:0;
pointer-events:none;

transition:0.3s;

z-index:998;

}

.overlay.active {

opacity:1;
pointer-events:auto;

}

/* ===== HEADER ===== */

header {

text-align:center;

padding-top:150px;
padding-bottom:50px;

}

h1 {

font-family:'Playfair Display',serif;

font-size:80px;

letter-spacing:6px;

margin:0;

}

.subtitle {

margin-top:20px;

font-size:13px;

letter-spacing:4px;

color:#555;

}

/* ===== HERO ===== */

.hero {

text-align:center;

margin-bottom:80px;

}

.hero img {

width:100%;
max-width:1100px;

}

.booking-button {

display:inline-block;

margin-top:45px;

padding:22px 60px;

font-size:16px;

letter-spacing:3px;

border:1px solid #111;

text-decoration:none;

color:#111;

transition:0.3s;

}

.booking-button:hover {

background:#111;
color:white;

}

/* ===== PORTFOLIO ===== */

.section {

padding:80px 20px;

text-align:center;

}

.section h2 {

font-family:'Playfair Display',serif;

font-size:36px;

letter-spacing:3px;

margin-bottom:50px;

}

.albums {

display:grid;

grid-template-columns: repeat(2, 380px);

justify-content:center;

gap:40px;

}

.album {

position:relative;

width:380px;

margin:auto;

}

.album img {

width:100%;
height:480px;

object-fit:cover;

}

.album-title-box {

position:absolute;

bottom:15px;

left:15px;
right:15px;

background:rgba(0,0,0,0.45);

color:white;

padding:16px;

letter-spacing:3px;

font-size:14px;

text-align:center;

}

/* ===== MOBILE ===== */

@media (max-width:768px){

h1 {
font-size:42px;
}

.subtitle {
font-size:11px;
}

.albums {
grid-template-columns:1fr;
}

.album {
width:90%;
}

.album img {
height:auto;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="nav-container">

<div class="logo">
LUUILYY PHOTO
</div>

<div class="hamburger" onclick="toggleMenu()">
☰
</div>

</div>

</nav>

<!-- MENU PANEL -->

<div class="menu" id="menu">

<a href="index.html">Strona główna</a>
<a href="#portfolio">Portfolio</a>
<a href="#faq">FAQ</a>
<a href="#about">O mnie</a>
<a href="#contact">Kontakt</a>
<a href="rezerwacja.html">Rezerwacja</a>

</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay"></div>

<!-- HEADER -->

<header>

<h1>LUUILYY PHOTO</h1>

<p class="subtitle">
FASHION • FAIRYCORE • PORTRAITS
</p>

</header>

<!-- HERO -->

<div class="hero">

<img src="rozmiarprawidlowy.jpg">

<br>

<a href="rezerwacja.html" class="booking-button">
ZAREZERWUJ SESJĘ
</a>

</div>

<!-- JAVASCRIPT -->

<script>

function toggleMenu() {

document.getElementById("menu").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");

}

/* zamykanie po kliknięciu w tło */

document.getElementById("overlay").addEventListener("click", function(){

document.getElementById("menu").classList.remove("active");
document.getElementById("overlay").classList.remove("active");

});

</script>

</body>

</html>
