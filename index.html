<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Paulina Portfolio</title>

<!-- Ładna czcionka -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: black;
    color: white;
    font-family: 'Inter', sans-serif;
}

/* Nagłówek */

header {
    text-align: center;
    padding-top: 120px;
    padding-bottom: 40px;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 10px;
}

.subtitle {
    color: #aaa;
    font-size: 16px;
}

/* Zdjęcie główne */

.hero {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.hero img {
    width: 350px;
    height: auto;
    border-radius: 16px;
}

/* Sekcja galerii */

.section {
    text-align: center;
    padding: 80px 20px;
}

.section h2 {
    font-family: 'Playfair Display', serif;
    margin-bottom: 40px;
}

/* Galeria */

.gallery {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.gallery img {
    width: 260px;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    border-radius: 14px;
}

</style>

</head>

<body>

<header>

<h1>Paulina Witaszek</h1>

<p class="subtitle">
Photographer & beginner web developer
</p>

</header>

<div class="hero">

<img src="505947252_9991842110891643_2799595505019481989_n.jpg">

</div>

<div class="section">

<h2>My Work</h2>

<div class="gallery">

<img src="505947252_9991842110891643_2799595505019481989_n.jpg">

<img src="7549f87c-7076-4012-ac51-eb9521bd15bb.jpg">

<img src="julka.jpg">

</div>

</div>

</body>

</html>
