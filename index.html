<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Paulina Portfolio</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: black;
    color: white;
}

/* Nagłówek */

header {
    text-align: center;
    padding: 80px 20px 40px;
}

h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

p {
    color: #bbb;
}

/* Zdjęcie główne */

.hero-image {
    width: 100%;
    max-height: 500px;
    object-fit: contain;
}

/* Sekcja */

.section {
    padding: 60px 20px;
    text-align: center;
}

/* GALERIA OBOK SIEBIE */

.gallery {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

/* Zdjęcia 4:5 */

.gallery img {
    width: 260px;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    border-radius: 12px;
}

</style>

</head>

<body>

<header>

<h1>Paulina Witaszek</h1>

<p>Photographer & beginner web developer</p>

</header>

<img src="505947252_9991842110891643_2799595505019481989_n.jpg" class="hero-image">

<div class="section">

<h2>My Work</h2>

<div class="gallery">

<img src="505947252_9991842110891643_2799595505019481989_n.jpg">

<img src="7549f87c-7076-4012-ac51-eb9521bd15bb.jpg">

<img src="julka.jpg">

</div>

</div>

</body>

</html>
