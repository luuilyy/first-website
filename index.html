<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Paulina Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background-color: black;
    color: white;
    font-family: 'Montserrat', sans-serif;
}

/* Nagłówek */

header {
    text-align: center;
    padding-top: 140px;
    padding-bottom: 40px;
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 400;
    letter-spacing: 1px;
    margin-bottom: 15px;
}

.subtitle {
    color: #aaa;
    font-size: 14px;
    letter-spacing: 2px;
}

/* Zdjęcie główne */

.hero {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.hero img {
    width: 320px;
    height: auto;
}

/* Sekcja */

.section {
    text-align: center;
    padding: 100px 20px;
}

.section h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 400;
    margin-bottom: 40px;
}

/* Galeria */

.gallery {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.gallery img {
    width: 260px;
    aspect-ratio: 4 / 5;
    object-fit: cover;
}

</style>

</head>

<body>

<header>

<h1>Paulina Witaszek</h1>

<p class="subtitle">
PHOTOGRAPHER
</p>

</header>

<div class="hero">

<img src="505947252_9991842110891643_2799595505019481989_n.jpg">

</div>

<div class="section">

<h2>My Work</h2>

<div class="gallery">

<img src="505947252_9991842110891643_2799595505019481989_n.jpg">

<img src="7549f87c-7076-4012-ac51-eb9521bd15bb.jpg">

<img src="julka.jpg">

</div>

</div>

</body>

</html>
