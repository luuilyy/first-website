<style>

body {
margin:0;
background:white;
font-family:'Montserrat',sans-serif;
}

/* MENU */

nav {
position:fixed;
top:0;
width:100%;
background:white;
border-bottom:1px solid #eee;
padding:18px 0;
z-index:999;
}

.nav-container {
max-width:1150px;
margin:auto;
display:flex;
justify-content:space-between;
padding:0 25px;
}

.logo {
font-family:'Playfair Display',serif;
font-size:22px;
letter-spacing:3px;
}

.menu a {
text-decoration:none;
color:#111;
margin-left:14px;
font-size:13px;
letter-spacing:2px;
border:1px solid transparent;
padding:10px 18px;
}

.menu a:hover {
border:1px solid #111;
}

/* SEKCJA */

.section {
padding:150px 20px 80px;
text-align:center;
}

.section h2 {
font-family:'Playfair Display',serif;
font-size:40px;
letter-spacing:4px;
margin-bottom:60px;
}

/* ALBUMY */

.album-gallery {
display:grid;
grid-template-columns:repeat(2,360px);
justify-content:center;
gap:45px;
}

.album {
position:relative;
text-decoration:none;
}

.album img {
width:360px;
aspect-ratio:4/5;
object-fit:cover;
}

.album-title {
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.5);
color:white;
padding:18px;
font-size:14px;
letter-spacing:2px;
}

</style>

</head>
