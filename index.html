<html lang="en">

<head>

<title>Paulina Portfolio</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #111;
    color: white;
    text-align: center;
}

header {
    padding: 60px 20px;
}

h1 {
    font-size: 40px;
}

p {
    color: #ccc;
}

img {
    width: 300px;
    border-radius: 15px;

}

    background-color: white;
    color: black;

button:hover {

<header>

<p>Beginner web developer & photographer</p>

<img src="505947252_9991842110891643_2799595505019481989_n.jpg">

</header>

<div class="section">

<h2>About me</h2>

<p>
I am starting my journey in web development and learning how to build websites.
This is my first simple project published on GitHub.
</p>

</div>

<div class="section">

<h2>Contact</h2>

<form>

<input type="text" placeholder="Your name"><br>

<input type="email" placeholder="Your email"><br>
