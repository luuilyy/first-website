<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sesje kobiece — studio</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BODY */

body {
margin:0;
font-family:'Montserrat',sans-serif;
background:white;
}

/* NAV */

nav {

position:fixed;
top:0;
width:100%;

background:white;
border-bottom:1px solid #eee;

padding:18px 0;

z-index:999;

}

.nav-container {

max-width:1150px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 25px;

}

.logo {

font-family:'Playfair Display',serif;
font-size:22px;
letter-spacing:3px;

}

/* HAMBURGER */

.hamburger {

font-size:28px;
cursor:pointer;

}

/* MENU PANEL */

.menu {

position:fixed;

top:0;
right:0;

width:280px;
height:100vh;

background:white;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transform:translateX(100%);
transition:0.3s;

box-shadow:-5px 0 15px rgba(0,0,0,0.1);

z-index:1000;

}

.menu.active {

transform:translateX(0);

}

.menu a {

text-decoration:none;
color:#111;

padding:18px;

font-size:14px;
letter-spacing:2px;

transition:0.3s;

}

.menu a:hover {

color:#888;

}

/* OVERLAY */

.overlay {

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.3);

opacity:0;
pointer-events:none;

transition:0.3s;

z-index:900;

}

.overlay.active {

opacity:1;
pointer-events:auto;

}

/* TYTUŁ */

.album-title {

padding-top:150px;

text-align:center;

font-family:'Playfair Display',serif;

font-size:38px;

letter-spacing:4px;

margin-bottom:60px;

}

/* GALERIA */

.gallery {

display:grid;

grid-template-columns: repeat(3, 320px);

justify-content:center;

gap:35px;

}

.gallery img {

width:320px;

aspect-ratio:4/5;

object-fit:cover;

cursor:pointer;

transition:0.3s;

}

.gallery img:hover {

transform:scale(1.03);

opacity:0.9;

}

/* LIGHTBOX */

.lightbox {

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.95);

justify-content:center;
align-items:center;

z-index:1001;

}

.lightbox img {

max-width:90%;
max-height:90%;

}

.arrow {

position:absolute;

top:50%;

font-size:40px;

color:white;

cursor:pointer;

padding:20px;

}

.arrow-left { left:20px; }

.arrow-right { right:20px; }

/* MOBILE */

@media (max-width:768px){

.album-title {

font-size:26px;

padding-top:140px;

}

.gallery {

grid-template-columns:1fr;

}

.gallery img {

width:90%;

margin:auto;

}

.menu {

width:260px;

}

}

</style>

</head>

<body>

<!-- NAV -->

<nav>

<div class="nav-container">

<div class="logo">
LUUILYY PHOTO
</div>

<div class="hamburger" onclick="toggleMenu()">
☰
</div>

</div>

</nav>

<!-- MENU -->

<div class="menu" id="menu">

<a href="index.html">Strona główna</a>

<a href="index.html#portfolio">Portfolio</a>

<a href="faq.html">FAQ</a>

<a href="index.html#about">O mnie</a>

<a href="index.html#contact">Kontakt</a>

<a href="rezerwacja.html">Rezerwacja</a>

</div>

<div class="overlay" id="overlay"></div>

<!-- TYTUŁ -->

<h2 class="album-title">
SESJE KOBIECE — STUDIO
</h2>

<!-- GALERIA -->

<div class="gallery">

<img src="B6561F9D-D11D-44A8-97ED-794853CE5E23.jpg">
<img src="IMG_8599.JPG">
<img src="28886b2b-4367-4c60-a7d6-4655f1ab8574.jpg">

</div>

<!-- LIGHTBOX -->

<div class="lightbox" id="lightbox">

<span class="arrow arrow-left" id="prev">&#10094;</span>

<img id="lightbox-img">

<span class="arrow arrow-right" id="next">&#10095;</span>

</div>

<script>

/* MENU */

function toggleMenu() {

document.getElementById("menu").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");

}

document.getElementById("overlay").addEventListener("click", function(){

document.getElementById("menu").classList.remove("active");
document.getElementById("overlay").classList.remove("active");

});

const menuLinks = document.querySelectorAll(".menu a");

menuLinks.forEach(link => {

link.addEventListener("click", () => {

document.getElementById("menu").classList.remove("active");
document.getElementById("overlay").classList.remove("active");

});

});

/* LIGHTBOX */

const images=document.querySelectorAll(".gallery img");

const lightbox=document.getElementById("lightbox");

const lightboxImg=document.getElementById("lightbox-img");

const next=document.getElementById("next");

const prev=document.getElementById("prev");

let currentIndex=0;

images.forEach((img,index)=>{

img.addEventListener("click",()=>{

currentIndex=index;

showImage();

lightbox.style.display="flex";

});

});

function showImage(){

lightboxImg.src=images[currentIndex].src;

}

next.onclick=(e)=>{

e.stopPropagation();

currentIndex++;

if(currentIndex>=images.length)

currentIndex=0;

showImage();

};

prev.onclick=(e)=>{

e.stopPropagation();

currentIndex--;

if(currentIndex<0)

currentIndex=images.length-1;

showImage();

};

lightbox.onclick=()=>{

lightbox.style.display="none";

};

document.addEventListener("keydown",(e)=>{

if(e.key==="Escape")

lightbox.style.display="none";

if(e.key==="ArrowRight")

next.click();

if(e.key==="ArrowLeft")

prev.click();

});

</script>

</body>

</html>
