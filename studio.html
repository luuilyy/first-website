<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sesje kobiece — studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>

body {
margin:0;
font-family:'Montserrat',sans-serif;
background:white;
}

/* TYTUŁ */

.album-title {
padding-top:120px;
text-align:center;
font-family:'Playfair Display',serif;
font-size:38px;
letter-spacing:4px;
margin-bottom:60px;
}

/* GALERIA */

.gallery {

display:grid;

grid-template-columns: repeat(3, 320px);

justify-content:center;

gap:35px;

}

.gallery img {

width:320px;

aspect-ratio:4/5;

object-fit:cover;

cursor:pointer;

transition:0.3s;

}

.gallery img:hover {

transform:scale(1.03);

}

/* LIGHTBOX */

.lightbox {

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,0.9);

justify-content:center;

align-items:center;

z-index:1000;

}

.lightbox img {

max-width:90%;

max-height:90%;

}

</style>

</head>

<body>

<h2 class="album-title">
SESJE KOBIECE — STUDIO
</h2>

<div class="gallery">

<img src="B6561F9D-D11D-44A8-97ED-794853CE5E23.jpg">

<img src="IMG_8599.JPG">

<img src="28886b2b-4367-4c60-a7d6-4655f1ab8574.jpg">

</div>

<div class="lightbox" id="lightbox">

<img id="lightbox-img">

</div>

<script>

const images = document.querySelectorAll(".gallery img");

const lightbox = document.getElementById("lightbox");

const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {

img.addEventListener("click", () => {

lightbox.style.display = "flex";

lightboxImg.src = img.src;

});

});

lightbox.addEventListener("click", () => {

lightbox.style.display = "none";

});

</script>

</body>

</html>
