<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sesje kobiece — plener</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BODY */

body {
margin:0;
font-family:'Montserrat',sans-serif;
background:white;
}

/* NAV */

nav {

position:fixed;
top:0;
width:100%;

background:white;
border-bottom:1px solid #eee;

padding:18px 0;

z-index:999;

}

.nav-container {

max-width:1150px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 25px;

}

.logo {

font-family:'Playfair Display',serif;
font-size:22px;
letter-spacing:3px;

}

/* HAMBURGER */

.hamburger {

font-size:28px;
cursor:pointer;

}

/* MENU PANEL */

.menu {

position:fixed;

top:0;
right:0;

width:280px;
height:100vh;

background:white;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transform:translateX(100%);
transition:0.3s;

box-shadow:-5px 0 15px rgba(0,0,0,0.1);

z-index:1000;

}

.menu.active {

transform:translateX(0);

}

.menu a {

text-decoration:none;
color:#111;

padding:18px;

font-size:14px;
letter-spacing:2px;

transition:0.3s;

}

.menu a:hover {

color:#888;

}

/* OVERLAY */

.overlay {

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.3);

opacity:0;
pointer-events:none;

transition:0.3s;

z-index:900;

}

.overlay.active {

opacity:1;
pointer-events:auto;

}

/* BACK BUTTON */

.back-link {

display:inline-block;

margin-top:140px;
margin-left:40px;

font-size:13px;
letter-spacing:2px;

text-decoration:none;

color:#111;

border-bottom:1px solid transparent;

transition:0.3s;

}

.back-link:hover {

border-bottom:1px solid #111;

}

/* TITLE */

.album-title {

text-align:center;

font-family:'Playfair Display',serif;

font-size:38px;

letter-spacing:4px;

margin-top:30px;

margin-bottom:60px;

}

/* GALLERY */

.gallery {

display:grid;

grid-template-columns: repeat(3, 320px);

justify-content:center;

gap:35px;

}

.gallery img {

width:320px;

aspect-ratio:4/5;

object-fit:cover;

cursor:pointer;

transition:0.3s;

}

.gallery img:hover {

transform:scale(1.03);

opacity:0.9;

}

/* LIGHTBOX */

.lightbox {

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.95);

justify-content:center;
align-items:center;

z-index:1001;

}

.lightbox img {

max-width:90%;
max-height:90%;

}

/* MOBILE */

@media (max-width:768px){

.gallery {
grid-template-columns:1fr;
}

.gallery img {
width:90%;
margin:auto;
}

.menu {
width:260px;
}

.back-link {
margin-left:20px;
}

}

</style>

</head>

<body>

<nav>

<div class="nav-container">

<div class="logo">
LUUILYY PHOTO
</div>

<div class="hamburger" onclick="toggleMenu()">
☰
</div>

</div>

</nav>

<div class="menu" id="menu">

<a href="index.html">Strona główna</a>
<a href="index.html#portfolio">Portfolio</a>
<a href="faq.html">FAQ</a>
<a href="index.html#about">O mnie</a>
<a href="index.html#contact">Kontakt</a>
<a href="rezerwacja.html">Rezerwacja</a>

</div>

<div class="overlay" id="overlay"></div>

<!-- BACK -->

<a href="index.html#portfolio" class="back-link">

← WRÓĆ DO PORTFOLIO

</a>

<h2 class="album-title">

SESJE KOBIECE — PLENER

</h2>

<!-- GALERIA — POPRAWIONE ZDJĘCIA -->

<div class="gallery">

<img src="IMG_5170.JPEG">

<img src="Bez nazwy-1687.jpg">

<img src="Bez nazwy-1727.jpg">

</div>

<div class="lightbox" id="lightbox">

<img id="lightbox-img">

</div>

<script>

function toggleMenu() {

document.getElementById("menu").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");

}

document.getElementById("overlay").addEventListener("click", function(){

document.getElementById("menu").classList.remove("active");
document.getElementById("overlay").classList.remove("active");

});

/* LIGHTBOX */

const images=document.querySelectorAll(".gallery img");

const lightbox=document.getElementById("lightbox");

const lightboxImg=document.getElementById("lightbox-img");

images.forEach(img=>{

img.addEventListener("click",()=>{

lightbox.style.display="flex";
lightboxImg.src=img.src;

});

});

lightbox.onclick=()=>{

lightbox.style.display="none";

};

</script>

</body>

</html>
